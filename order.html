<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wildflower Meadow! - Order Form</title>
    <link rel="icon" type="image/x-icon" href="media/favicon_io/favicon.ico">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/contactstyles.css">
<!-- DON'T COPY/PASTE UPPER PART -->
</head>
<body>
 <div class="contact-section">
            <h2>💐 Order Your Flowers Today! 💐</h2>
            <form action="thankyou.html">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone">

                <label for="subject">Type of Flower(s):</label>
                <input type="text" id="subject" name="subject" required>

                <label for="message">Extra Requests:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Send Order</button>
            </form>
        </div>

        <hr>
        <p style="text-align: center;">We look forward to getting your order!</p>

    </div>

    <footer>
        <p>&copy; 2025 Wildflower Meadow!| Come visit us!</p>
    </footer>
</body>
</html>
